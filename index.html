<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Angle & Z-Limit Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0d1117;
    --bg-panel: #161b22;
    --bg-input: #0d1117;
    --bg-section: #1c2333;
    --border: #30363d;
    --border-focus: #58a6ff;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-label: #c9d1d9;
    --green: #00ff88;
    --red: #ff4444;
    --amber: #ffaa00;
    --warn: #ff8c00;
    --blue: #58a6ff;
    --accent: #388bfd;
    --green-bg15: rgba(0,255,136,0.15);
    --green-bg12: rgba(0,255,136,0.12);
    --green-bg25: rgba(0,255,136,0.25);
    --green-border: rgba(0,255,136,0.3);
    --red-bg15: rgba(255,68,68,0.15);
    --red-bg12: rgba(255,68,68,0.12);
    --red-border: rgba(255,68,68,0.3);
    --amber-bg15: rgba(255,170,0,0.15);
    --amber-bg12: rgba(255,170,0,0.12);
    --amber-border: rgba(255,170,0,0.3);
    --warn-bg15: rgba(255,140,0,0.25);
    --warn-bg12: rgba(255,140,0,0.2);
    --warn-border: rgba(255,140,0,0.45);
  }

  body {
    font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;
    background: var(--bg-dark);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
  }

  .main-layout {
    display: flex;
    flex: 1;
    min-height: 0; /* allow flex children to shrink below content size */
    overflow: hidden;
  }

  .left-panel {
    width: 460px;
    min-width: 260px;
    max-width: 700px;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0; /* critical for flex scroll */
  }

  .resize-handle {
    width: 5px;
    flex-shrink: 0;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
    position: relative;
    z-index: 20;
  }
  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--accent);
  }

  .right-panel {
    flex: 1;
    position: relative;
    background: #0a0e14;
    overflow: hidden;
  }

  #three-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .section {
    background: var(--bg-section);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .section-header h2 {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .section-header .toggle {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .section-header.collapsed .toggle {
    transform: rotate(-90deg);
  }

  .section-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0; /* prevent flex blowout */
  }

  .section-body.collapsed {
    display: none;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field-row label {
    font-size: 11px;
    color: var(--text-label);
    min-width: 140px;
    flex-shrink: 0;
  }

  .field-row input, .field-row select {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field-row select option, #sel-recent-files option {
    background: var(--bg-input);
    color: var(--text);
  }

  .field-row input:focus, .field-row select:focus {
    border-color: var(--border-focus);
  }

  .field-row .unit {
    font-size: 10px;
    color: var(--text-dim);
    min-width: 24px;
  }

  textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 8px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--border-focus);
  }

  textarea::placeholder {
    color: #484f58;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }

  .btn:hover { background: #4a9eff; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .btn-secondary:hover {
    border-color: var(--text-dim);
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Mode toggle switch */
  .mode-toggle {
    display: flex; align-items: center; gap: 0; cursor: pointer; user-select: none;
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px;
    overflow: hidden; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    font-family: inherit; flex-shrink: 0;
  }
  .mode-toggle .mode-opt {
    padding: 4px 10px; color: var(--text-dim); transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .mode-toggle .mode-opt.active {
    background: var(--accent); color: #fff; font-weight: 700;
  }

  /* Results */
  .result-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 12px;
    font-size: 11px;
  }

  .result-grid .lbl {
    color: var(--text-dim);
    text-align: right;
  }

  .result-grid .val {
    color: var(--text);
    font-weight: 500;
  }

  .status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .status-ok { background: var(--green-bg15); color: var(--green); border: 1px solid var(--green-border); }
  .status-fail { background: var(--red-bg15); color: var(--red); border: 1px solid var(--red-border); }
  .status-warn { background: var(--warn-bg15); color: var(--warn); border: 1px solid var(--warn-border); }

  /* Dashboard status cards */
  .status-card {
    flex: 1;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    border: 2px solid var(--border);
    background: var(--bg-section);
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .status-card:hover { background: rgba(255,255,255,0.03); }
  .status-card.card-ok    { border-color: var(--green); }
  .status-card.card-warn  { border-color: var(--warn); }
  .status-card.card-fail  { border-color: var(--red); }
  .status-card .card-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
  .status-card .card-badge { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .status-card .card-margin { font-size: 12px; opacity: 0.8; }

  /* Expandable detail rows */
  .detail-row { padding: 6px 8px; border-radius: 6px; cursor: pointer; user-select: none; }
  .detail-row:hover { background: rgba(255,255,255,0.04); }
  .detail-row .detail-summary { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .detail-row .detail-arrow { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; display: inline-block; }
  .detail-row.expanded .detail-arrow { transform: rotate(90deg); }
  .detail-row .detail-body { display: none; padding: 6px 0 2px 18px; }
  .detail-row.expanded .detail-body { display: block; }
  .detail-row .detail-label { font-weight: 600; flex: 1; }
  .detail-row .detail-value { color: var(--text-dim); }

  .matrix-output {
    font-size: 10px;
    line-height: 1.6;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    white-space: pre;
    overflow-x: auto;
    position: relative;
    max-width: 100%;
  }

  .copy-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .hidden { display: none !important; }

  .error-msg {
    color: var(--red);
    font-size: 11px;
    padding: 4px 0;
  }

  /* 3D overlay labels */
  .scene-label {
    position: absolute;
    font-family: 'JetBrains Mono', Consolas, monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7), 0 1px 2px rgba(0,0,0,0.9);
    background: rgba(10, 14, 20, 0.8);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .view-buttons {
    position: absolute;
    bottom: 8px;
    right: 8px;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 460px;
    gap: 4px;
    z-index: 10;
  }
  .view-buttons button {
    background: rgba(20, 28, 38, 0.85);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'JetBrains Mono', Consolas, monospace;
    cursor: pointer;
  }
  .view-buttons button:hover {
    background: rgba(40, 55, 75, 0.9);
    color: var(--text);
  }

  .scene-label.label-green { color: var(--green); }
  .scene-label.label-red { color: var(--red); }
  .scene-label.label-blue { color: var(--blue); }
  .scene-label.label-amber { color: var(--amber); }
  .scene-label.label-gray { color: #888888; }

  /* Inline color spans used in result grids (not 3D overlays) */
  .color-green { color: var(--green); font-weight: 700; }
  .color-red { color: var(--red); font-weight: 700; }
  .color-amber { color: var(--amber); font-weight: 700; }
  .color-warn { color: var(--warn); font-weight: 700; }
  .color-blue { color: var(--blue); font-weight: 700; }

  /* Scrollbar */
  .left-panel::-webkit-scrollbar { width: 6px; }
  .left-panel::-webkit-scrollbar-track { background: transparent; }
  .left-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .divider { height: 1px; background: var(--border); margin: 2px 0; }

  .inline-note {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    padding: 2px 0;
  }

  /* Batch table */
  .batch-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
  }

  .batch-table th {
    text-align: left;
    padding: 4px 6px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--bg-section);
    z-index: 1;
  }

  .batch-table td {
    padding: 3px 6px;
    border-bottom: 1px solid rgba(48,54,61,0.4);
    white-space: nowrap;
  }

  .batch-table tr { cursor: pointer; transition: background 0.1s; }
  .batch-table tr:hover { background: rgba(88,166,255,0.08); }

  .batch-row-ok td:first-child { border-left: 3px solid var(--green); }
  .batch-row-fail td:first-child { border-left: 3px solid var(--red); }
  .batch-row-warn td:first-child { border-left: 3px solid var(--warn); }
  .batch-row-unused { opacity: 0.45; }
  .batch-row-active { background: rgba(88,166,255,0.12) !important; }
  .batch-row-active td:first-child { border-left-color: var(--blue) !important; }

  .batch-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .batch-badge-ok { background: var(--green-bg12); color: var(--green); }
  .batch-badge-fail { background: var(--red-bg12); color: var(--red); }
  .batch-badge-warn { background: var(--warn-bg12); color: var(--warn); }

  .batch-filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 6px;
  }

  .batch-chip {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .batch-chip:hover { border-color: var(--text-dim); color: var(--text); }
  .batch-chip.active { border-color: var(--accent); color: var(--text); background: rgba(56,139,253,0.15); }

  .batch-scroll {
    overflow-x: auto;
  }

  .batch-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .batch-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 4px; }
  .batch-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

  .batch-override { color: var(--amber); font-style: italic; cursor: pointer; }
  .batch-override:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>PLANE ANGLE & Z-LIMIT CALCULATOR</h1>
  <span class="subtitle">5-Axis CNC Plane Feasibility</span>
</header>

<div class="main-layout">
  <div class="left-panel">

    <!-- Parameters (Machine Settings + Plane Data + Feature Inputs) -->
    <div class="section" id="sec-inputs">
      <div class="section-header" style="cursor:default">
        <h2>Parameters</h2>
        <button class="btn btn-secondary hidden" id="btn-refresh-file" onclick="refreshPlaneFile()" style="font-size:11px;padding:5px 0;margin-left:auto;width:65%;border-color:var(--amber);color:var(--amber)" title="Reload source file">&#x21bb; RELOAD FILE</button>
      </div>
      <div class="section-body">
        <textarea id="in-plane" style="display:none"></textarea>
        <div class="btn-row" style="align-items:center;margin-bottom:6px">
          <label style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;min-width:80px;flex-shrink:0">Input</label>
          <span class="mode-toggle" id="input-mode-toggle">
            <span class="mode-opt active" data-mode="file" onclick="setInputMode('file')">File</span>
            <span class="mode-opt" data-mode="angles" onclick="setInputMode('angles')">Angles</span>
          </span>
        </div>
        <div id="file-input-group">
          <div class="btn-row" style="align-items:center;margin-bottom:6px">
            <span id="file-picker-row" style="display:contents">
              <span id="file-name" style="font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0" title="">No file loaded</span>
              <select id="sel-recent-files" style="font-size:10px;padding:3px 4px;max-width:120px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:4px">
                <option value="">Recent files...</option>
              </select>
              <button class="btn btn-secondary" onclick="pickPlaneFile()" style="font-size:10px;padding:3px 10px">LOAD FILE</button>
              <input type="file" id="file-input-fallback" accept=".txt,.text" style="display:none">
            </span>
          </div>
        </div>
        <div id="angles-input-row" class="hidden">
          <div class="field-row">
            <label>Inclination (tilt)</label>
            <input type="number" id="in-angle-c" value="" step="0.1" min="0" max="90" placeholder="0 - 90">
            <span class="unit">deg</span>
          </div>
          <div class="field-row">
            <label>Rotation (azimuth)</label>
            <input type="number" id="in-angle-a" value="" step="0.1" min="-180" max="180" placeholder="-180 to 180">
            <span class="unit">deg</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="field-row">
          <label>Upper Z limit</label>
          <input type="number" id="in-zlimit" value="980" step="1" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Z axis travel</label>
          <input type="number" id="in-ztravel" value="" step="1" placeholder="optional" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>X axis travel</label>
          <input type="number" id="in-xtravel" value="3000" step="1" placeholder="3000" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Y axis travel</label>
          <input type="number" id="in-ytravel" value="2500" step="1" placeholder="2500" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Tool length (CoR to tip)</label>
          <input type="number" id="in-toollen" value="" step="0.1" placeholder="required">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Tool radius</label>
          <input type="number" id="in-toolradius" value="" step="0.1" placeholder="optional" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Machining ref</label>
          <select id="in-machmode">
            <option value="center">Tool center point</option>
            <option value="radius">Tool radius (edge)</option>
          </select>
        </div>
        <div class="field-row">
          <label>Safety margin</label>
          <input type="number" id="in-warntolerance" value="20" step="1" placeholder="20" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="divider"></div>
        <div class="field-row">
          <label>Z machining level</label>
          <input type="number" id="in-zfeature" value="" step="0.1" placeholder="required" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Part height</label>
          <input type="number" id="in-partheight" value="" step="0.1" placeholder="optional" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Platform height</label>
          <input type="number" id="in-platformheight" value="" step="0.1" placeholder="optional" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="field-row">
          <label>Part clearance height</label>
          <input type="number" id="in-clearanceheight" value="" step="0.1" placeholder="optional" min="0">
          <span class="unit">mm</span>
        </div>
        <button class="btn btn-secondary" id="btn-calc-now" onclick="window.calculate();" style="width:100%;margin-top:8px;padding:6px 0;font-size:11px;border-color:var(--green);color:var(--green)">CALCULATE</button>
      </div>
    </div>

    <!-- Mastercam Planes -->
    <div class="section hidden" id="sec-batch">
      <div class="section-header" onclick="toggleSection('sec-batch')">
        <h2>Mastercam Planes <span id="batch-count" style="color:var(--text);font-weight:400"></span></h2>
        <span class="toggle">&#9660;</span>
      </div>
      <div class="section-body" style="padding:6px 8px">
        <div id="batch-filters" class="batch-filter-bar"></div>
        <div class="batch-scroll">
          <table class="batch-table">
            <thead><tr>
              <th onclick="setBatchSort('name')" style="cursor:pointer;user-select:none">Name <span id="sort-name"></span></th>
              <th onclick="setBatchSort('C')" style="cursor:pointer;user-select:none">Incl° <span id="sort-C"></span></th>
              <th onclick="setBatchSort('A')" style="cursor:pointer;user-select:none">Rot° <span id="sort-A"></span></th>
              <th onclick="setBatchSort('machining')" style="cursor:pointer;user-select:none">Machining <span id="sort-machining"></span></th>
              <th onclick="setBatchSort('clearance')" style="cursor:pointer;user-select:none">Clearance <span id="sort-clearance"></span></th>
            </tr></thead>
            <tbody id="batch-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Results Dashboard -->
    <div id="sec-results" class="hidden">
      <div id="result-angles" style="text-align:center;padding:10px 0 6px 0">
        <span id="file-angles-header" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);display:block;margin-bottom:2px">Plane Angles</span>
        <span id="val-C" style="font-size:28px;font-weight:700;color:var(--text)"></span>
        <span id="val-A" style="font-size:16px;color:var(--text-dim);margin-left:14px"></span>
      </div>
